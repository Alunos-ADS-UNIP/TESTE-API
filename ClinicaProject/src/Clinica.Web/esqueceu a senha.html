<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Sistema de Agendamento</title>
    <link rel="stylesheet" href="estilogeral.css">
</head>
<body>
    <div class="login-container">
        <form class="login-box">
            <div class="icone-recuperacao">🔑</div>
            <h2>Esqueceu a senha?</h2>
            <p>Insira seu e-mail cadastrado e enviaremos um link para você criar uma nova senha.</p>

            <div class="input-group">
                <label for="emailRecuperar">E-mail de Cadastro</label>
                <input type="email" id="emailRecuperar" placeholder="exemplo@email.com" class="input-estilizado">
            </div>

            <button type="button" id="btnRecuperar" class="btn-auth">Enviar Instruções</button>
            
            <div class="auth-footer">
                <span>Lembrou a senha? <a href="./login.html">Voltar para o Login</a></span>
            </div>
        </form>
    </div>
    <script src="esqueceu-senha.js"></script>
</body>
</html>
