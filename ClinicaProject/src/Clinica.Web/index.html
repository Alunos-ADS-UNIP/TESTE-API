<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <script src="./index.js"></script>
    <title>Agendamento Consulta</title>
</head>
<body>
   <body>
    <div class="titulo-pagina">Agendamento Consulta</div>

    <div class="Agendamento">
        <!-- Bloco do Paciente -->
        <div class="card-info paciente">
            <div class="indicador"></div>
            <h2>Paciente</h2>
            <div class="dados">
                <p><strong>Nome:</strong> Davi gusmao</p>
                <p><strong>Idade:</strong> 19 anos</p>
            </div>
        </div>

        <!-- Bloco do Terapeuta -->
        <div class="card-info terapeuta">
            <div class="indicador"></div>
            <h2>Terapeuta/Médico</h2>
            <div class="acao-grupo">
                <select id="selectTerapeutaPrincipal" class="select-moderno">
                    <option value="">Selecione um Profissional...</option>
                    <option value="Davi">Davi Gusmao Vinciaqui (Psicólogo)</option>
                    <option value="Ana">Ana Caroline Freitas (Psicóloga)</option>
                    <option value="Adolfo">Adolfo Martins (Nutricionista)</option>
                    <option value="Nubia"> Nubia Andrade (Geral)</option>
                </select>
                <button id="btnAbrir" class="btn-primario">Agendar Consulta</button>
            </div>
        </div>

        <!-- Popup de Agendamento -->
        <dialog id="modalAgenda" class="modal-moderno">
            <div class="modal-header">
                <h2>Novo Agendamento</h2>
            </div>
            
            <div class="modal-body">
                <div class="passo">
                    <label>1. Selecione o Terapeuta/Médico</label>
                    <select id="selectTerapeuta" class="select-moderno">
                        <option value="">Selecione um profissional...</option>
                        <option value="Davi">Davi Gusmao Vinciaqui (Psicólogo)</option>
                        <option value="Ana">Ana Caroline Freitas (Psicóloga)</option>
                        <option value="Adolfo">Adolfo Martins (Nutricionista)</option>
                        <option value="Nubia"> Nubia Andrade (Geral)</option>
                    </select>
                </div>

                <div class="passo">
                    <label>2. Escolha a Data</label>
                    <input type="date" id="dataAgendamento" class="input-data">
                </div>

                <div class="passo">
                    <label>3. Horários Disponíveis</label>
                    <div id="containerHorarios" class="horarios-grid"></div>
                </div>

                <div class="resumo-final">
                    <p id="textoResumo">Selecione as opções acima...</p>
                    <div class="botoes-footer">
                        <button id="btnFechar" class="btn-cancelar">Fechar</button>
                        <button id="confirmarAgendamento" class="btn-confirmar">Confirmar</button>
                    </div>
                </div>
            </div>
        </dialog>

        <!-- Toast de Erro (Aviso) -->
        <div id="toastErro" class="toast-moderno">
            <div class="toast-barra"></div>
            <div class="toast-texto">
                <strong>⚠️ Erro no Agendamento</strong>
                <p>Selecione o médico e o horário.</p>
            </div>
        </div>
    </div>
</body>

</body>
</html>
